site_name: gamedev skripta
site_description: Studijní skripta herního vývoje — teorie her, praxe v UE5, zápisky z vlastních projektů.
site_url: https://martinsafka.github.io/gamedev-skripta/
repo_url: https://github.com/Martinsafka/gamedev-skripta

theme:
  name: material
  language: cs
  palette:
    scheme: default        # světlé pozadí, tmavý font — projektový požadavek
    primary: black
    accent: deep orange
  features:
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - toc.follow
    - content.tooltips

plugins:
  - search:
      lang:
        - cs
        - en

markdown_extensions:
  - abbr                    # *[Term]: definice → hover tooltip
  - attr_list
  - admonition
  - toc:
      permalink: true
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md   # tooltipy na každé stránce
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

nav:
  - Úvod: index.md
  - Teorie her:
      - teorie/index.md
      - Tvůrčí proces a mindset:
          - Proč tvořit: teorie/proc-tvorit.md
          - Začátky bez zkušeností: teorie/zacatky-bez-zkusenosti.md
          - Start projektu: teorie/jak-zacit.md
          - Kolik kódu na start: teorie/co-se-ucit.md
          - Žrouti času: teorie/produktivita.md
          - Idea iceberg: teorie/rady-z-praxe.md
          - Postmortem ShantyTown: teorie/postmortem-shantytown.md
      - Nápad, scope a plánování:
          - Nápad: teorie/napad.md
          - Scope a malé hry: teorie/scope.md
          - Prototypování a vertical slice: teorie/prototypovani.md
      - Základy designu:
          - Engagement a appeal: teorie/zaklady.md
          - Zábava a flow: teorie/zabava.md
          - Smyčky a řetězce: teorie/smycky-a-retezce.md
          - Game feel a imerze: teorie/game-feel.md
          - Příběh a postavy: teorie/pribeh-a-postavy.md
      - Level design:
          - Vedení hráče: teorie/vedeni-hrace.md
          - Prostor a hranice: teorie/prostor-a-hranice.md
      - Vydání a marketing:
          - Co prodává: teorie/co-prodava.md
          - Steam stránka: teorie/steam-stranka.md
          - První dojem: teorie/prvni-dojem.md
          - Devlogy: teorie/devlogy.md
      - "Rešerše: slovanská mytologie":
          - Bestiář: teorie/slovanska-monstra.md
          - Zimní rituály: teorie/slovanske-ritualy.md
          - Vasilisa a Baba Jaga: teorie/slovansky-folklor.md
  - Praxe v UE5:
      - praxe/index.md
      - Blueprint architektura a organizace projektu:
          - Principy architektury: praxe/principy-architektury.md
          - Komunikace Blueprintů: praxe/komunikace-blueprintu.md
          - Interakce bez Event Ticku: praxe/interakce-bez-event-ticku.md
          - Gameplay Tags: praxe/gameplay-tags.md
          - Organizace projektu: praxe/organizace-projektu.md
          - Levely a streaming: praxe/levely-a-streaming.md
          - Ukládání: praxe/ukladani.md
          - Telemetrie: praxe/telemetrie.md
      - Motion Matching a GASP:
          - Motion Matching základy: praxe/mm-zaklady.md
          - Systémy nad MM: praxe/mm-systemy.md
          - "GASP: Game Animation Sample": praxe/gasp.md
      - Pohyb postavy (locomotion):
          - Základy pohybu: praxe/pohyb-zaklady.md
          - Parkour postaru: praxe/parkour-vault.md
          - Mover: praxe/mover.md
      - AI a chování NPC:
          - Základy nepřátelské AI: praxe/ai-zaklady.md
          - AI vnímání: praxe/ai-vnimani.md
          - State Trees: praxe/state-trees.md
      - Herní systémy a interakce:
          - Kroky a povrchy: praxe/footsteps.md
          - Pasti a arénové mechaniky: praxe/pasti-a-mechaniky.md
          - Interakce s předměty a úkryty: praxe/interakce-predmety.md
      - "Fyzika: ragdoll, lana, simulace":
          - Ragdoll: praxe/ragdoll.md
          - Kabely, lana a Physics Control: praxe/lana-kabely.md
      - Voda:
          - Voda a buoyancy: praxe/voda-a-buoyancy.md
          - Interaktivní voda: praxe/interaktivni-voda.md
          - "Nástroje: EasyWaterscape": praxe/nastroje-voda.md
      - "Animace: nástroje a mocap":
          - Animační nástroje: praxe/animace-nastroje.md
      - MetaHuman:
          - MetaHuman v praxi: praxe/metahuman.md
      - Terén a krajina:
          - Landscape tipy: praxe/landscape-tipy.md
          - Mesh Terrain (UE 5.8): praxe/mesh-terrain.md
      - Editor a workflow:
          - Tipy do editoru: praxe/editor-tipy.md
  - Zápisky:
      - zapisky/index.md
  - Rejstřík: rejstrik.md

validation:
  links:
    absolute_links: warn
    unrecognized_links: warn
